<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mary Kay - Catálogo Junho 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --pink-100: #fce4ec;
  --pink-200: #f8bbd0;
  --pink-300: #f48fb1;
  --pink-400: #f06292;
  --pink-500: #ec407a;
  --pink-600: #d81b60;
  --pink-700: #c2185b;
  --rose-gold: #e8a87c;
  --glass-bg: rgba(255, 255, 255, 0.15);
  --glass-border: rgba(255, 255, 255, 0.25);
  --glass-shadow: rgba(0, 0, 0, 0.1);
  --text-primary: #1a1a2e;
  --text-secondary: #555;
  --gradient-1: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
  --gradient-2: linear-gradient(135deg, #d81b60, #c2185b, #880e4f);
  --gradient-3: linear-gradient(135deg, rgba(216, 27, 96, 0.1), rgba(192, 24, 91, 0.05));
}
body {
  font-family: 'Inter', sans-serif;
  background: var(--gradient-1);
  min-height: 100vh;
  color: var(--text-primary);
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: -50%;
  right: -50%;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(248,187,208,0.3) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -50%;
  left: -50%;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(244,143,177,0.2) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
::-webkit-scrollbar-thumb { background: var(--pink-400); border-radius: 4px; }

/* Header */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
  padding: 0 24px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}
.header-logo h1 {
  font-size: 24px;
  font-weight: 800;
  font-family: 'Playfair Display', serif;
  letter-spacing: -0.5px;
  background: var(--gradient-2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-logo span {
  font-size: 13px;
  color: var(--pink-600);
  font-weight: 500;
  background: rgba(216,27,96,0.1);
  padding: 2px 10px;
  border-radius: 20px;
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 16px;
}
.cart-btn {
  position: relative;
  background: var(--gradient-2);
  border: none;
  color: white;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(216,27,96,0.3);
}
.cart-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(216,27,96,0.4); }
.cart-badge {
  position: absolute;
  top: -6px;
  right: -6px;
  background: #ff6b6b;
  color: white;
  font-size: 11px;
  font-weight: 700;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  display: none;
}

/* Hero */
.hero {
  margin-top: 70px;
  padding: 60px 24px 40px;
  text-align: center;
  position: relative;
  z-index: 1;
}
.hero h2 {
  font-size: clamp(32px, 5.5vw, 58px);
  font-weight: 800;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  letter-spacing: -1px;
  line-height: 1.1;
  background: var(--gradient-2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
}
.hero p {
  color: var(--text-secondary);
  font-size: 17px;
  font-weight: 400;
  line-height: 1.6;
  max-width: 520px;
  margin: 0 auto 24px;
}
.hero-badge {
  display: inline-block;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.3);
  padding: 6px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  color: var(--pink-600);
}

/* Categories */
.categories {
  position: relative;
  z-index: 1;
  padding: 0 24px 20px;
  max-width: 1400px;
  margin: 0 auto;
}
.categories-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 4px 0;
  scrollbar-width: none;
}
.categories-scroll::-webkit-scrollbar { display: none; }
.cat-btn {
  flex-shrink: 0;
  padding: 10px 22px;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(10px);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.3s;
}
.cat-btn:hover { background: rgba(255,255,255,0.5); transform: translateY(-1px); }
.cat-btn.active {
  background: var(--gradient-2);
  color: white;
  border-color: transparent;
  box-shadow: 0 4px 15px rgba(216,27,96,0.3);
}

/* Products Grid */
.products-section {
  position: relative;
  z-index: 1;
  padding: 0 24px 100px;
  max-width: 1400px;
  margin: 0 auto;
}
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.product-card {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 20px;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  cursor: pointer;
  position: relative;
}
.product-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 60px rgba(216,27,96,0.15);
  border-color: rgba(216,27,96,0.2);
}
.product-img-wrap {
  width: 100%;
  aspect-ratio: 1;
  overflow: hidden;
  background: rgba(255,255,255,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.product-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  transition: transform 0.5s;
}
.product-card:hover .product-img-wrap img {
  transform: scale(1.05);
}
.product-info {
  padding: 16px 20px 20px;
}
.product-category {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--pink-400);
  margin-bottom: 4px;
}
.product-name {
  font-size: 15px;
  font-weight: 600;
  font-family: 'Playfair Display', serif;
  color: var(--text-primary);
  line-height: 1.3;
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-price {
  font-size: 20px;
  font-weight: 800;
  color: var(--pink-600);
}
.product-price small {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}
.add-to-cart {
  position: absolute;
  bottom: 16px;
  right: 16px;
  width: 40px;
  height: 40px;
  border-radius: 12px;
  border: none;
  background: var(--gradient-2);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(216,27,96,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
}
.add-to-cart:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(216,27,96,0.3); }

/* Cart Sidebar */
.cart-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(5px);
  z-index: 2000;
  display: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.cart-overlay.open { display: block; opacity: 1; }
.cart-sidebar {
  position: fixed;
  top: 0;
  right: -420px;
  width: 400px;
  max-width: 100vw;
  height: 100vh;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(30px);
  z-index: 2001;
  transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  display: flex;
  flex-direction: column;
  box-shadow: -10px 0 40px rgba(0,0,0,0.1);
}
.cart-sidebar.open { right: 0; }
.cart-header {
  padding: 20px 24px;
  border-bottom: 1px solid rgba(0,0,0,0.05);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cart-header h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
}
.cart-close {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: none;
  background: rgba(0,0,0,0.05);
  cursor: pointer;
  font-size: 16px;
  color: var(--text-secondary);
  transition: all 0.3s;
}
.cart-close:hover { background: rgba(0,0,0,0.1); }
.cart-items {
  flex: 1;
  overflow-y: auto;
  padding: 16px 24px;
}
.cart-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}
.cart-empty i { font-size: 48px; color: var(--pink-300); margin-bottom: 16px; }
.cart-item {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);
}
.cart-item-img {
  width: 60px;
  height: 60px;
  border-radius: 10px;
  overflow: hidden;
  background: rgba(255,255,255,0.5);
  flex-shrink: 0;
}
.cart-item-img img { width: 100%; height: 100%; object-fit: contain; }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.cart-item-price { font-size: 15px; font-weight: 700; color: var(--pink-600); }
.cart-item-qty {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}
.qty-btn {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  border: 1px solid rgba(0,0,0,0.1);
  background: white;
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.qty-btn:hover { background: var(--pink-100); border-color: var(--pink-300); }
.cart-item-qty span { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }
.cart-item-remove {
  background: none;
  border: none;
  color: #ccc;
  cursor: pointer;
  font-size: 14px;
  padding: 4px;
  align-self: flex-start;
  transition: color 0.2s;
}
.cart-item-remove:hover { color: #ff6b6b; }
.cart-footer {
  padding: 20px 24px;
  border-top: 1px solid rgba(0,0,0,0.05);
  background: rgba(255,255,255,0.5);
}
.cart-total {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.cart-total span:first-child { font-size: 14px; color: var(--text-secondary); }
.cart-total span:last-child { font-size: 24px; font-weight: 800; color: var(--pink-600); }
.whatsapp-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #25D366, #128C7E);
  color: white;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 4px 15px rgba(37,211,102,0.3);
}
.whatsapp-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37,211,102,0.4); }
.whatsapp-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
  color: white;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  z-index: 3000;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Loading */
.loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--pink-400);
}
.loading i { font-size: 40px; margin-bottom: 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading i { animation: spin 1s linear infinite; }

/* Search */
.search-wrap {
  position: relative;
  flex: 1;
  max-width: 400px;
}
.search-wrap input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  border-radius: 50px;
  border: 1px solid rgba(0,0,0,0.08);
  background: rgba(255,255,255,0.5);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
  transition: all 0.3s;
}
.search-wrap input:focus { border-color: var(--pink-300); background: white; box-shadow: 0 0 0 3px rgba(216,27,96,0.1); }
.search-wrap i {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #aaa;
  font-size: 14px;
}

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 0 16px; height: 60px; }
  .header-logo h1 { font-size: 18px; }
  .search-wrap { max-width: 200px; }
  .search-wrap input { font-size: 13px; padding: 8px 12px 8px 34px; }
  .hero { padding: 40px 16px 24px; margin-top: 60px; }
  .products-section { padding: 0 16px 80px; }
  .categories { padding: 0 16px 16px; }
  .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .product-info { padding: 12px 14px 16px; }
  .product-name { font-size: 13px; }
  .product-price { font-size: 17px; }
  .add-to-cart { width: 34px; height: 34px; font-size: 14px; bottom: 12px; right: 12px; }
  .cart-sidebar { width: 100vw; }
}
@media (max-width: 480px) {
  .products-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <a href="#" class="header-logo">
    <h1>Mary Kay</h1>
    <span>Junho 2026</span>
  </a>
  <div class="search-wrap">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="Buscar produtos..." oninput="filterProducts()">
  </div>
  <div class="header-actions">
    <button class="cart-btn" onclick="toggleCart()">
      <i class="fas fa-shopping-bag"></i>
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </div>
</header>

<!-- Hero -->
<section class="hero">
  <div class="hero-badge"><i class="fas fa-calendar"></i> Catálogo Junho 2026</div>
  <h2>Beleza que transforma</h2>
  <p>Descubra os produtos Mary Kay com preços especiais. Compre pelo WhatsApp com atendimento personalizado!</p>
</section>

<!-- Categories -->
<section class="categories">
  <div class="categories-scroll" id="categoriesScroll"></div>
</section>

<!-- Products -->
<section class="products-section">
  <div class="products-grid" id="productsGrid"></div>
</section>

<!-- Cart -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3><i class="fas fa-shopping-bag" style="color:var(--pink-400)"></i> Seu Carrinho</h3>
    <button class="cart-close" onclick="toggleCart()"><i class="fas fa-times"></i></button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty">
      <i class="fas fa-shopping-bag"></i>
      <p>Seu carrinho está vazio</p>
      <p style="font-size:13px;margin-top:4px">Adicione produtos para começar</p>
    </div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total</span>
      <span id="cartTotal">R$ 0,00</span>
    </div>
    <button class="whatsapp-btn" id="whatsappBtn" onclick="sendWhatsApp()" disabled>
      <i class="fab fa-whatsapp"></i> Comprar via WhatsApp
    </button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const WHATSAPP_NUMBER = '5541988521663';
let products = [];
let cart = [];
let currentCategory = 'todos';

async function loadProducts() {
  try {
    const res = await fetch('products.json');
    products = await res.json();
    renderCategories();
    renderProducts();
  } catch (e) {
    document.getElementById('productsGrid').innerHTML = `
      <div class="loading"><i class="fas fa-spinner"></i><p>Carregando produtos...</p></div>`;
    const res = await fetch('products.json');
    products = await res.json();
    renderCategories();
    renderProducts();
  }
}

function getCategories() {
  const cats = new Set();
  cats.add('todos');
  products.forEach(p => {
    if (p.category) cats.add(p.category);
  });
  return Array.from(cats);
}

function renderCategories() {
  const cats = getCategories();
  const container = document.getElementById('categoriesScroll');
  container.innerHTML = cats.map(cat => `
    <button class="cat-btn ${cat === currentCategory ? 'active' : ''}"
      onclick="setCategory('${cat}')">
      ${cat === 'todos' ? 'Todos' : cat}
    </button>
  `).join('');
}

function setCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === (cat === 'todos' ? 'Todos' : cat));
  });
  renderProducts();
}

function filterProducts() {
  renderProducts();
}

function renderProducts() {
  const search = document.getElementById('searchInput').value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const filtered = products.filter(p => {
    const matchCat = currentCategory === 'todos' || p.category === currentCategory;
    const name = (p.name || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    const matchSearch = !search || name.includes(search);
    return matchCat && matchSearch;
  });
  const grid = document.getElementById('productsGrid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-secondary);grid-column:1/-1"><i class="fas fa-search" style="font-size:40px;color:var(--pink-300);margin-bottom:16px;display:block"></i>Nenhum produto encontrado</div>';
    return;
  }
  grid.innerHTML = filtered.map(p => {
    const price = p.price || 0;
    const imgUrl = p.image || 'https://marykay.vtexassets.com/arquivos/ids/158059/Base.png';
    const inCart = cart.find(c => c.id === p.id);
    return `
    <div class="product-card">
      <div class="product-img-wrap" onclick="quickAdd('${p.id}')">
        <img src="${imgUrl}" alt="${p.name}" loading="lazy"
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f8bbd0%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 font-size=%2212%22 fill=%22%23d81b60%22>MK</text></svg>'">
      </div>
      <div class="product-info">
        <div class="product-category">${p.category || 'Mary Kay'}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">R$ ${price.toFixed(2).replace('.', ',')} <small>à vista</small></div>
      </div>
      <button class="add-to-cart" onclick="event.stopPropagation(); addToCart('${p.id}')" title="Adicionar ao carrinho">
        <i class="fas ${inCart ? 'fa-check' : 'fa-plus'}"></i>
      </button>
    </div>`;
  }).join('');
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  if (!product) return;
  const existing = cart.find(c => c.id === id);
  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ ...product, qty: 1 });
  }
  updateCartUI();
  showToast(`${product.name} adicionado ao carrinho!`);
}

function quickAdd(id) {
  addToCart(id);
}

function removeFromCart(id) {
  cart = cart.filter(c => c.id !== id);
  updateCartUI();
}

function changeQty(id, delta) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) {
    removeFromCart(id);
    return;
  }
  updateCartUI();
}

function updateCartUI() {
  const totalItems = cart.reduce((s, c) => s + c.qty, 0);
  const badge = document.getElementById('cartBadge');
  if (totalItems > 0) {
    badge.style.display = 'flex';
    badge.textContent = totalItems;
  } else {
    badge.style.display = 'none';
  }

  const container = document.getElementById('cartItems');
  if (cart.length === 0) {
    container.innerHTML = `
      <div class="cart-empty">
        <i class="fas fa-shopping-bag"></i>
        <p>Seu carrinho está vazio</p>
        <p style="font-size:13px;margin-top:4px">Adicione produtos para começar</p>
      </div>`;
  } else {
    container.innerHTML = cart.map(c => `
      <div class="cart-item">
        <div class="cart-item-img">
          <img src="${c.image}" alt="${c.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f8bbd0%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 font-size=%2212%22 fill=%22%23d81b60%22>MK</text></svg>'">
        </div>
        <div class="cart-item-info">
          <div class="cart-item-name">${c.name}</div>
          <div class="cart-item-price">R$ ${(c.price * c.qty).toFixed(2).replace('.', ',')}</div>
          <div class="cart-item-qty">
            <button class="qty-btn" onclick="changeQty('${c.id}', -1)"><i class="fas fa-minus"></i></button>
            <span>${c.qty}</span>
            <button class="qty-btn" onclick="changeQty('${c.id}', 1)"><i class="fas fa-plus"></i></button>
          </div>
        </div>
        <button class="cart-item-remove" onclick="removeFromCart('${c.id}')"><i class="fas fa-times"></i></button>
      </div>
    `).join('');
  }

  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  document.getElementById('cartTotal').textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
  document.getElementById('whatsappBtn').disabled = cart.length === 0;

  // Update add-to-cart buttons
  document.querySelectorAll('.add-to-cart').forEach(btn => {
    const card = btn.closest('.product-card');
    if (!card) return;
    const imgWrap = card.querySelector('.product-img-wrap');
    if (!imgWrap) return;
    const idx = Array.from(document.querySelectorAll('.product-card')).indexOf(card);
    if (idx === -1) return;
    const filtered = getFilteredProducts();
    const p = filtered[idx];
    if (!p) return;
    const inCart = cart.find(c => c.id === p.id);
    btn.innerHTML = inCart ? '<i class="fas fa-check"></i>' : '<i class="fas fa-plus"></i>';
  });
}

function getFilteredProducts() {
  const search = document.getElementById('searchInput').value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  return products.filter(p => {
    const matchCat = currentCategory === 'todos' || p.category === currentCategory;
    const name = (p.name || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    const matchSearch = !search || name.includes(search);
    return matchCat && matchSearch;
  });
}

function toggleCart() {
  const overlay = document.getElementById('cartOverlay');
  const sidebar = document.getElementById('cartSidebar');
  const isOpen = sidebar.classList.contains('open');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
  document.body.style.overflow = isOpen ? '' : 'hidden';
}

function sendWhatsApp() {
  if (cart.length === 0) return;
  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  let message = '🛍️ *Pedido Mary Kay - Catálogo Junho 2026*\n\n';
  message += '*Produtos:*\n';
  cart.forEach((c, i) => {
    message += `${i+1}. ${c.name} - ${c.qty}x R$ ${c.price.toFixed(2).replace('.', ',')} = R$ ${(c.price * c.qty).toFixed(2).replace('.', ',')}\n`;
  });
  message += `\n*Total: R$ ${total.toFixed(2).replace('.', ',')}*\n\n`;
  message += '👤 *Cliente:* (a confirmar)\n📍 *Entrega:* (a confirmar)\n💳 *Pagamento:* (a confirmar)\n\n';
  message += '_Pedido gerado via catálogo online_';
  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
  window.open(url, '_blank');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 2500);
}

loadProducts();
</script>
</body>
</html>
